name: Docker Elements Test Suite

on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:

jobs:
  elements-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEFAULT_BASE_URL: https://www.neosprotect.com.au/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve BASE_URL
        run: |
          if [ -n "${{ vars.BASE_URL }}" ]; then
            echo "BASE_URL=${{ vars.BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${DEFAULT_BASE_URL}" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: docker build -t neos-playwright-tests:${{ github.sha }} .

      - name: Prepare artifact folders
        run: mkdir -p playwright-report test-results allure-results

      - name: Run elements suite in Docker
        run: |
          docker run --rm \
            -e BASE_URL="${BASE_URL}" \
            -e CI=true \
            -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            neos-playwright-tests:${{ github.sha }} npm run test:e2e -- --grep @smoke

      - name: Upload elements Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload elements test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload elements Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 14
