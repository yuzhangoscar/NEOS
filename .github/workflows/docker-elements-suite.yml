name: Docker Elements Test Suite

on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
permissions:
  contents: write

concurrency:
  group: neos-allure-pages
  cancel-in-progress: false

jobs:
  elements-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEFAULT_BASE_URL: https://www.neosprotect.com.au/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve BASE_URL
        run: |
          if [ -n "${{ vars.BASE_URL }}" ]; then
            echo "BASE_URL=${{ vars.BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${DEFAULT_BASE_URL}" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: docker build -t neos-playwright-tests:${{ github.sha }} .

      - name: Prepare artifact folders
        run: mkdir -p playwright-report test-results allure-results

      - name: Run elements suite in Docker
        id: run_elements
        continue-on-error: true
        run: |
          docker run --rm \
            -e BASE_URL="${BASE_URL}" \
            -e CI=true \
            -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            neos-playwright-tests:${{ github.sha }} npm run test:e2e -- --grep @smoke

      - name: Upload elements Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload elements test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload elements Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: elements-allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Get Allure history
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report with history
        if: ${{ always() }}
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          subfolder: allure/elements
          keep_reports: 30

      - name: Publish Allure report to GitHub Pages
        if: ${{ always() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Print Allure report URL
        if: ${{ always() }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_REPORT_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/allure/elements/"
          RUN_REPORT_URL="${BASE_REPORT_URL}${GITHUB_RUN_NUMBER}/"
          echo "::notice title=Allure Report URL::${RUN_REPORT_URL}"
          echo "Allure report URL: ${RUN_REPORT_URL}"
          {
            echo "### Allure report (elements suite)"
            echo "- Latest: ${BASE_REPORT_URL}"
            echo "- This run: ${RUN_REPORT_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if elements suite failed
        if: ${{ steps.run_elements.outcome == 'failure' }}
        run: exit 1
