name: Playwright Insurance Tests

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and Linux dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (headless)
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://www.progressive.com"
          fi
          BASE_URL="$BASE_URL" npm run test:e2e

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test result artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Allure raw results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 14
