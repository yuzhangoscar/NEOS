name: Docker Sequential Test Suites

on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
permissions:
  contents: write

concurrency:
  group: neos-allure-pages
  cancel-in-progress: false

jobs:
  sequential-suites:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEFAULT_BASE_URL: https://www.neosprotect.com.au/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve BASE_URL
        run: |
          if [ -n "${{ vars.BASE_URL }}" ]; then
            echo "BASE_URL=${{ vars.BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${DEFAULT_BASE_URL}" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: docker build -t neos-playwright-tests:${{ github.sha }} .

      - name: Prepare artifact folders
        run: |
          mkdir -p artifacts/sequential/visual/playwright-report
          mkdir -p artifacts/sequential/visual/test-results
          mkdir -p artifacts/sequential/visual/allure-results
          mkdir -p artifacts/sequential/elements/playwright-report
          mkdir -p artifacts/sequential/elements/test-results
          mkdir -p artifacts/sequential/elements/allure-results
          mkdir -p artifacts/sequential/accessibility/playwright-report
          mkdir -p artifacts/sequential/accessibility/test-results
          mkdir -p artifacts/sequential/accessibility/allure-results

      - name: Run visual suite in Docker
        id: run_visual
        continue-on-error: true
        run: |
          docker run --rm \
            -e BASE_URL="${BASE_URL}" \
            -e CI=true \
            -v "${{ github.workspace }}/artifacts/sequential/visual/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/artifacts/sequential/visual/test-results:/app/test-results" \
            -v "${{ github.workspace }}/artifacts/sequential/visual/allure-results:/app/allure-results" \
            neos-playwright-tests:${{ github.sha }} npm run test:visual

      - name: Run elements suite in Docker
        id: run_elements
        if: ${{ steps.run_visual.outcome == 'success' }}
        continue-on-error: true
        run: |
          docker run --rm \
            -e BASE_URL="${BASE_URL}" \
            -e CI=true \
            -v "${{ github.workspace }}/artifacts/sequential/elements/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/artifacts/sequential/elements/test-results:/app/test-results" \
            -v "${{ github.workspace }}/artifacts/sequential/elements/allure-results:/app/allure-results" \
            neos-playwright-tests:${{ github.sha }} npm run test:e2e -- --grep @smoke

      - name: Run accessibility suite in Docker
        id: run_accessibility
        if: ${{ steps.run_visual.outcome == 'success' && steps.run_elements.outcome == 'success' }}
        continue-on-error: true
        run: |
          docker run --rm \
            -e BASE_URL="${BASE_URL}" \
            -e CI=true \
            -v "${{ github.workspace }}/artifacts/sequential/accessibility/playwright-report:/app/playwright-report" \
            -v "${{ github.workspace }}/artifacts/sequential/accessibility/test-results:/app/test-results" \
            -v "${{ github.workspace }}/artifacts/sequential/accessibility/allure-results:/app/allure-results" \
            neos-playwright-tests:${{ github.sha }} npm run test:a11y

      - name: Upload sequential suite artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: sequential-suite-artifacts
          path: artifacts/sequential/
          if-no-files-found: ignore
          retention-days: 14

      - name: Merge sequential Allure results
        if: ${{ always() }}
        run: |
          mkdir -p allure-results-sequential
          for suite in visual elements accessibility; do
            SUITE_RESULTS="artifacts/sequential/${suite}/allure-results"
            if [ -d "${SUITE_RESULTS}" ]; then
              cp -R "${SUITE_RESULTS}/." allure-results-sequential/
            fi
          done

      - name: Get Allure history
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report with history
        if: ${{ always() }}
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_results: allure-results-sequential
          allure_report: allure-report
          allure_history: allure-history
          subfolder: allure/sequential
          keep_reports: 30

      - name: Publish Allure report to GitHub Pages
        if: ${{ always() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Print Allure report URL
        if: ${{ always() }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_REPORT_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/allure/sequential/"
          RUN_REPORT_URL="${BASE_REPORT_URL}${GITHUB_RUN_NUMBER}/"
          echo "::notice title=Allure Report URL::${RUN_REPORT_URL}"
          echo "Allure report URL: ${RUN_REPORT_URL}"
          {
            echo "### Allure report (sequential suites)"
            echo "- Latest: ${BASE_REPORT_URL}"
            echo "- This run: ${RUN_REPORT_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if any sequential suite failed
        if: ${{ steps.run_visual.outcome == 'failure' || steps.run_elements.outcome == 'failure' || steps.run_accessibility.outcome == 'failure' }}
        run: exit 1
